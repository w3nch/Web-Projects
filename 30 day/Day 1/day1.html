<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" id="search" placeholder="Search for a city..." spellcheck="false">
            <button id="searchButton"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        
        <div class="weather">
            <i class="fa-solid fa-cloud"></i>
            <h1 class="temp"> 22°C</h1>
            <h1 class="city">New Delhi</h1>
            <div class="detai">
                <div class="col">
                    <h3 class="humidity"><i class="fa-solid fa-water"></i> Humidity: 60%</h3>
                    <h3 class="wind"><i class="fa-solid fa-wind"></i> Wind: 10 km/h</h3>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="logic.js"></script>
</html>
