<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="notes-header">
        <h1>📝 My Notes</h1>
        <button class="add-note" title="Add Note">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div class="container">
        <div class="notes">
            <div class="note">
                <div class="note-header">
                    <input type="text" class="note-title" placeholder="0 Title..." />
                    <div class="note-actions">
                        <button class="delete-note" title="Delete"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
                <textarea class="note-text" placeholder="Write your note here..."></textarea>
                <button class="save-note">Save</button>
            </div>
            <!-- More notes added dynamically -->
        </div>
    </div>

    <script type="module" src="logic.js"></script>
</body>

</html>
